arxiv_categories:
  - cs.AI
  - cs.LG
  - cs.CL

# Free-text description of your research interests. Used to rank papers by personal relevance.
# Example: "I work on efficient fine-tuning of LLMs and interpretability of transformer attention."
interests: "Vision-Language-Action Models, Robotics, Robot Learning, Computer Vision, Machine Learning for Molecular Forcefields, Machine Learning for Molecular Dynamics"

keywords_prioritize: [VLA, Robotics, Robot Learning, Computer Vision, Trace, Molecular Forcefields, Molecular Dynamics]

keywords_deprioritize: []

# How many candidate papers to evaluate before picking the top one.
# Higher values improve coverage but increase search time.
max_candidates: 10

# Boost papers that release code (GitHub link in abstract or comments).
prioritize_with_code: true

output_format:
  - title
  - authors
  - arxiv_link
  - code_link
  - why_it_matters
  - tl_dr
  - key_contribution
  - open_questions
